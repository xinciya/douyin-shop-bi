<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音小店数据BI看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'PingFang SC', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 32px 40px; box-shadow: 0 4px 20px rgba(102,126,234,0.3); }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
.header .subtitle { opacity: 0.85; margin-top: 8px; font-size: 14px; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.kpi-card { background: white; border-radius: 16px; padding: 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s; }
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
.kpi-label { font-size: 12px; color: #8c8c8c; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-value { font-size: 28px; font-weight: 700; margin: 6px 0 4px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.kpi-sub { font-size: 11px; color: #bbb; }
.section { background: white; border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.section h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; color: #2d2d2d; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
@media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8f9fc; padding: 10px 14px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #eee; white-space: nowrap; }
td { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
tr:hover td { background: #fafbff; }
.positive { color: #10b981; font-weight: 600; }
.negative { color: #ef4444; font-weight: 600; }
.neutral { color: #6b7280; }
.cause-card { background: #fafbff; border-radius: 12px; padding: 20px; margin-bottom: 16px; border-left: 4px solid #667eea; }
.cause-card.warn { border-left-color: #f59e0b; }
.cause-card.danger { border-left-color: #ef4444; }
.cause-card h3 { font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cause-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.tag-traffic { background: #fef3c7; color: #92400e; }
.tag-conv { background: #dbeafe; color: #1e40af; }
.tag-aov { background: #f3e8ff; color: #6b21a8; }
.cause-detail { font-size: 13px; color: #555; line-height: 1.8; margin-top: 8px; }
.cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.cat-card { background: #fafbff; border-radius: 12px; padding: 16px; border: 1px solid #e8ecf4; }
.cat-card h4 { font-size: 14px; margin-bottom: 10px; color: #333; }
.cat-card .cat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px dashed #eee; }
.cat-card .cat-row:last-child { border-bottom: none; }
.footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
</style>
</head>

<script>
// === DATA ===
const dailyTrend = [

// 商品按品类+国补归类
const products = [
  {id:"3820211135483871259",cat:"夸克S1",subsidy:false,sales:1187611,qty:295,daily:{"06-03":{s:0,q:0},"06-04":{s:28853,q:7},"06-05":{s:136831,q:33},"06-06":{s:412360,q:104},"06-07":{s:399095,q:100},"06-08":{s:190527,q:46},"06-09":{s:19945,q:5}}},

  {id:"3823894351185052125",cat:"千问S1",subsidy:true,sales:341204,qty:78,daily:{"06-05":{s:4599,q:1},"06-06":{s:7758,q:2},"06-07":{s:41762,q:10},"06-08":{s:212652,q:48},"06-09":{s:74433,q:17}}},
  {id:"3786064682893312668",cat:"夸克S1",subsidy:false,sales:332986,qty:80,daily:{"06-03":{s:48888,q:12},"06-04":{s:188535,q:45},"06-05":{s:62081,q:15},"06-06":{s:8598,q:2},"06-07":{s:8298,q:2},"06-08":{s:12297,q:3},"06-09":{s:4289,q:1}}},
  {id:"3810415090239406141",cat:"千问G1",subsidy:true,sales:214845,qty:95,daily:{"06-03":{s:2161,q:1},"06-04":{s:4953,q:2},"06-05":{s:18223,q:8},"06-06":{s:44468,q:20},"06-07":{s:65546,q:29},"06-08":{s:63809,q:28},"06-09":{s:15684,q:7}}},
  {id:"3814083153396629588",cat:"千问S1",subsidy:true,sales:200617,qty:45,daily:{"06-04":{s:67779,q:15},"06-05":{s:8898,q:2},"06-06":{s:52756,q:12},"06-07":{s:18096,q:4},"06-08":{s:48789,q:11},"06-09":{s:4299,q:1}}},
  {id:"3823732643443376321",cat:"千问S1",subsidy:false,sales:180928,qty:38,daily:{"06-05":{s:5312,q:1},"06-06":{s:22320,q:5},"06-07":{s:51858,q:11},"06-08":{s:82206,q:17},"06-09":{s:19232,q:4}}},
  {id:"3819990120745009551",cat:"夸克S1",subsidy:false,sales:136609,qty:27,daily:{"06-03":{s:15444,q:3},"06-04":{s:66379,q:13},"06-05":{s:30408,q:6},"06-06":{s:20080,q:4},"06-07":{s:4298,q:1}}},
  {id:"3820211423238291494",cat:"千问S1",subsidy:false,sales:126751,qty:29,daily:{"06-03":{s:4299,q:1},"06-04":{s:8598,q:2},"06-05":{s:26694,q:6},"06-06":{s:30423,q:7},"06-07":{s:8898,q:2},"06-08":{s:34392,q:8},"06-09":{s:13447,q:3}}},
  {id:"3810408817397727452",cat:"夸克S1",subsidy:true,sales:93907,qty:23,daily:{"06-04":{s:16296,q:4},"06-05":{s:28123,q:7},"06-06":{s:7998,q:2},"06-07":{s:4299,q:1},"06-08":{s:37191,q:9}}},
  {id:"3819860885221015620",cat:"千问S1",subsidy:false,sales:86918,qty:16,daily:{"06-04":{s:26845,q:5},"06-05":{s:5498,q:1},"06-07":{s:27255,q:5},"06-08":{s:27320,q:5}}},
  {id:"3805346751846678672",cat:"千问G1",subsidy:false,sales:77977,qty:33,daily:{"06-03":{s:4524,q:2},"06-04":{s:27353,q:12},"06-05":{s:22562,q:10},"06-06":{s:4770,q:2},"06-07":{s:6096,q:2},"06-08":{s:12672,q:5}}},
  {id:"3814267892866875768",cat:"千问G1",subsidy:false,sales:34058,qty:14,daily:{"06-04":{s:5291,q:2},"06-05":{s:7529,q:3},"06-06":{s:1951,q:1},"06-07":{s:7415,q:3},"06-08":{s:9340,q:4},"06-09":{s:2532,q:1}}},
  {id:"3819599439664906650",cat:"千问G1",subsidy:true,sales:30016,qty:9,daily:{"06-05":{s:6724,q:2},"06-06":{s:20124,q:6},"06-07":{s:3168,q:1}}},
  {id:"3810360892139372709",cat:"千问G1",subsidy:true,sales:28122,qty:13,daily:{"06-05":{s:2199,q:1},"06-06":{s:4348,q:2},"06-07":{s:6182,q:3},"06-08":{s:15393,q:7}}},
  {id:"3801459297515340084",cat:"夸克S1",subsidy:false,sales:21637,qty:4,daily:{"06-04":{s:5743,q:1},"06-05":{s:5498,q:1},"06-07":{s:5198,q:1},"06-08":{s:5198,q:1}}},
  {id:"3820210010135330849",cat:"千问S1",subsidy:false,sales:26994,qty:6,daily:{"06-04":{s:4599,q:1},"06-06":{s:4599,q:1},"06-07":{s:9198,q:2},"06-08":{s:8598,q:2}}}
];

// === 品类聚合 ===
const categories = {};
products.forEach(p => {
  const key = p.cat + (p.subsidy ? '（国补）' : '（非国补）');
  if (!categories[key]) categories[key] = { name: key, cat: p.cat, subsidy: p.subsidy, sales: 0, qty: 0, links: 0, dailySales: {}, dailyQty: {} };
  categories[key].sales += p.sales;
  categories[key].qty += p.qty;
  categories[key].links++;
  Object.entries(p.daily).forEach(([d, v]) => {
    categories[key].dailySales[d] = (categories[key].dailySales[d] || 0) + v.s;
    categories[key].dailyQty[d] = (categories[key].dailyQty[d] || 0) + v.q;
  });
});
const catList = Object.values(categories).sort((a, b) => b.sales - a.sales);

// === 核心变化原因分析 ===
function analyzeCauses() {
  const causes = [];
  for (let i = 1; i < dailyTrend.length; i++) {
    const today = dailyTrend[i];
    const yest = dailyTrend[i-1];
    const gmvChange = today.gmv - yest.gmv;
    const gmvPct = yest.gmv > 0 ? (gmvChange / yest.gmv * 100) : 0;
    if (Math.abs(gmvPct) < 15) continue;

    const orderChange = today.orderCount - yest.orderCount;
    const orderPct = yest.orderCount > 0 ? (orderChange / yest.orderCount * 100) : 0;
    const aovChange = today.avgOrderValue - yest.avgOrderValue;
    const aovPct = yest.avgOrderValue > 0 ? (aovChange / yest.avgOrderValue * 100) : 0;
    const qtyChange = today.productCount - yest.productCount;
    const qtyPct = yest.productCount > 0 ? (qtyChange / yest.productCount * 100) : 0;

    // 核心判断：订单量变化（反映流量×转化率）vs 客单价变化（结构因素）
    let mainCause = '';
    let causeTag = '';
    if (Math.abs(orderPct) > Math.abs(aovPct) * 2) {
      mainCause = gmvChange > 0 
        ? '订单量大幅增长 → 流量提升或转化率提高（订单+' + Math.round(orderPct) + '%，客单价仅' + (aovPct>=0?'+':'') + Math.round(aovPct) + '%）'
        : '订单量大幅下降 → 流量减少或转化率降低（订单' + Math.round(orderPct) + '%，客单价' + (aovPct>=0?'+':'') + Math.round(aovPct) + '%）';
      causeTag = 'traffic';
    } else if (Math.abs(aovPct) > Math.abs(orderPct) * 2) {
      mainCause = aovChange > 0 
        ? '客单价提升 → 高价商品占比增加（客单价+' + Math.round(aovPct) + '%，订单量仅' + (orderPct>=0?'+':'') + Math.round(orderPct) + '%）'
        : '客单价下降 → 低价商品/小件占比上升（客单价' + Math.round(aovPct) + '%，订单量' + (orderPct>=0?'+':'') + Math.round(orderPct) + '%）';
      causeTag = 'aov';
    } else {
      mainCause = '订单量（' + (orderPct>=0?'+':'') + Math.round(orderPct) + '%）和客单价（' + (aovPct>=0?'+':'') + Math.round(aovPct) + '%）同步变化';
      causeTag = 'conv';
    }

    // 品类变化归因
    const catChanges = [];
    const todayKey = today.date.substring(5);
    const yestKey = yest.date.substring(5);
    catList.forEach(c => {
      const ts = c.dailySales[todayKey] || 0;
      const ys = c.dailySales[yestKey] || 0;
      const tq = c.dailyQty[todayKey] || 0;
      const yq = c.dailyQty[yestKey] || 0;
      if (ts !== ys || tq !== yq) {
        catChanges.push({ name: c.name, salesChange: ts - ys, qtyChange: tq - yq });
      }
    });
    catChanges.sort((a, b) => a.salesChange - b.salesChange);

    causes.push({
      date: today.date,
      gmvPct: Math.round(gmvPct * 10) / 10,
      gmvChange: Math.round(gmvChange),
      orderPct: Math.round(orderPct * 10) / 10,
      aovPct: Math.round(aovPct * 10) / 10,
      qtyPct: Math.round(qtyPct * 10) / 10,
      mainCause, causeTag,
      topDecliners: catChanges.filter(c => c.salesChange < 0).slice(0, 5),
      topGainers: catChanges.filter(c => c.salesChange > 0).sort((a,b) => b.salesChange - a.salesChange).slice(0, 5)
    });
  }
  return causes;
}

const causes = analyzeCauses();

// === RENDER: Daily Chart (Sales + Volume dual axis) ===
new Chart(document.getElementById('dailyChart'), {
  type: 'bar',
  data: {
    labels: dailyTrend.map(d => d.date.substring(5)),
    datasets: [{
      type: 'line',
      label: '销售额 (万元)',
      data: dailyTrend.map(d => Math.round(d.gmv / 10000 * 10) / 10),
      borderColor: '#667eea',
      backgroundColor: 'rgba(102,126,234,0.08)',
      fill: true, tension: 0.4, pointRadius: 6, pointBackgroundColor: '#667eea', borderWidth: 3,
      yAxisID: 'y'
    }, {
      type: 'bar',
      label: '销量 (件)',
      data: dailyTrend.map(d => d.productCount),
      backgroundColor: 'rgba(118,75,162,0.55)',
      borderRadius: 6,
      yAxisID: 'y1'
    }]
  },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'top', labels: { usePointStyle: true, padding: 20 } } },
    scales: {
      y: { position: 'left', title: { display: true, text: '销售额 (万元)', color: '#667eea' }, beginAtZero: true },
      y1: { position: 'right', title: { display: true, text: '销量 (件)', color: '#764ba2' }, beginAtZero: true, grid: { drawOnChartArea: false } }
    }
  }
});

// === RENDER: Category Chart (国补 vs 非国补, Sales + Volume) ===
const subsidyCats = catList.filter(c => c.subsidy);
const nonSubsidyCats = catList.filter(c => !c.subsidy);
const allCatNames = [...new Set(catList.map(c => c.cat))];
new Chart(document.getElementById('categoryChart'), {
  type: 'bar',
  data: {
    labels: allCatNames,
    datasets: [{
      label: '国补-销售额(万)',
      data: allCatNames.map(cn => { const c = subsidyCats.find(x => x.cat === cn); return c ? Math.round(c.sales/10000) : 0; }),
      backgroundColor: 'rgba(102,126,234,0.7)', borderRadius: 4
    }, {
      label: '非国补-销售额(万)',
      data: allCatNames.map(cn => { const c = nonSubsidyCats.find(x => x.cat === cn); return c ? Math.round(c.sales/10000) : 0; }),
      backgroundColor: 'rgba(245,87,108,0.6)', borderRadius: 4
    }, {
      label: '国补-销量(件)',
      data: allCatNames.map(cn => { const c = subsidyCats.find(x => x.cat === cn); return c ? c.qty : 0; }),
      backgroundColor: 'rgba(102,126,234,0.3)', borderRadius: 4, yAxisID: 'y1'
    }, {
      label: '非国补-销量(件)',
      data: allCatNames.map(cn => { const c = nonSubsidyCats.find(x => x.cat === cn); return c ? c.qty : 0; }),
      backgroundColor: 'rgba(245,87,108,0.25)', borderRadius: 4, yAxisID: 'y1'
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { position: 'top', labels: { usePointStyle: true, font: { size: 11 } } } },
    scales: {
      y: { position: 'left', title: { display: true, text: '销售额 (万元)' }, beginAtZero: true },
      y1: { position: 'right', title: { display: true, text: '销量 (件)' }, beginAtZero: true, grid: { drawOnChartArea: false } }
    }
  }
});

// === RENDER: Category Detail Cards ===
const catGridEl = document.getElementById('catGrid');
catList.forEach(c => {
  const card = document.createElement('div');
  card.className = 'cat-card';
  card.innerHTML = '<h4>' + c.name + ' <span style="font-size:11px;color:#999">(' + c.links + '个链接)</span></h4>' +
    '<div class="cat-row"><span>总销售额</span><b>¥' + (c.sales/10000).toFixed(1) + '万</b></div>' +
    '<div class="cat-row"><span>总销量</span><b>' + c.qty + '件</b></div>' +
    '<div class="cat-row"><span>件均价</span><b>¥' + Math.round(c.sales/c.qty) + '</b></div>' +
    '<div class="cat-row"><span>日均销售额</span><b>¥' + Math.round(c.sales/7).toLocaleString() + '</b></div>' +
    '<div class="cat-row"><span>日均销量</span><b>' + (Math.round(c.qty/7*10)/10) + '件</b></div>';
  catGridEl.appendChild(card);
});

// === RENDER: Cause Analysis ===
const causeEl = document.getElementById('causeCards');
causes.forEach(c => {
  const isDown = c.gmvChange < 0;
  const tagMap = { traffic: ['流量/转化', 'tag-traffic'], conv: ['复合因素', 'tag-conv'], aov: ['客单价', 'tag-aov'] };
  const tagInfo = tagMap[c.causeTag];
  const items = isDown ? c.topDecliners : c.topGainers;
  let itemsHtml = items.map(it => 
    '<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px dashed #eee">' +
    '<span>' + it.name + '</span>' +
    '<span class="' + (it.salesChange>=0?'positive':'negative') + '">销售额' + (it.salesChange>=0?'+':'') + '¥' + Math.round(Math.abs(it.salesChange)/10000*10)/10 + '万 ｜ 销量' + (it.qtyChange>=0?'+':'') + it.qtyChange + '件</span></div>'
  ).join('');
  
  causeEl.innerHTML += '<div class="cause-card ' + (isDown ? 'danger' : '') + '">' +
    '<h3>' + c.date + '：销售额' + (isDown?'下降':'上升') + ' ' + Math.abs(c.gmvPct) + '% <span class="cause-tag ' + tagInfo[1] + '">主因：' + tagInfo[0] + '</span></h3>' +
    '<div class="cause-detail">' +
    '<b>指标分解：</b>订单量 ' + (c.orderPct>=0?'+':'') + c.orderPct + '% ｜ 客单价 ' + (c.aovPct>=0?'+':'') + c.aovPct + '% ｜ 销量 ' + (c.qtyPct>=0?'+':'') + c.qtyPct + '%<br>' +
    '<b>核心诊断：</b>' + c.mainCause +
    '</div>' +
    '<div style="margin-top:12px"><b>' + (isDown?'下降品类明细：':'增长品类明细：') + '</b></div>' +
    '<div style="margin-top:6px">' + itemsHtml + '</div>' +
    '</div>';
});

// === RENDER: Volatility Table ===
const tbl = document.getElementById('volatilityTable');
tbl.innerHTML = '<thead><tr><th>日期</th><th>销售额</th><th>环比</th><th>变化率</th><th>销量</th><th>销量环比</th><th>订单</th><th>客单价</th></tr></thead><tbody>' +
  dailyTrend.slice(1).map((d, i) => {
    const prev = dailyTrend[i];
    const gmvC = d.gmv - prev.gmv;
    const gmvP = prev.gmv > 0 ? (gmvC/prev.gmv*100) : 0;
    const qtyC = d.productCount - prev.productCount;
    return '<tr>' +
      '<td>' + d.date + '</td>' +
      '<td>¥' + Math.round(d.gmv).toLocaleString() + '</td>' +
      '<td class="' + (gmvC>=0?'positive':'negative') + '">' + (gmvC>=0?'+':'') + '¥' + Math.round(gmvC).toLocaleString() + '</td>' +
      '<td class="' + (gmvP>=0?'positive':'negative') + '">' + (gmvP>=0?'+':'') + (Math.round(gmvP*10)/10) + '%</td>' +
      '<td>' + d.productCount + '件</td>' +
      '<td class="' + (qtyC>=0?'positive':'negative') + '">' + (qtyC>=0?'+':'') + qtyC + '件</td>' +
      '<td>' + d.orderCount + '单</td>' +
      '<td>¥' + d.avgOrderValue.toLocaleString() + '</td>' +
      '</tr>';
  }).join('') + '</tbody>';
</script>
</body>
</html>
